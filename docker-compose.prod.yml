services:
  backend:
    ports: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  celery-worker:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  nginx:
    # If your VPS already has another reverse-proxy bound to 80/443, don't bind to 80/443 here.
    # Expose this app on a separate host port (default 8082) and (optionally) have your main proxy forward to it.
    ports:
      - "${APP_HTTP_PORT:-8082}:80"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
